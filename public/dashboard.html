<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attorney Dashboard — Flex Legal Services</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F3D6B;
    --navy-dark: #082a4d;
    --navy-light: #1a5490;
    --gold: #C9A84C;
    --gold-light: #e8d5a3;
    --gold-dark: #a8863a;
    --cream: #FAF8F4;
    --cream-dark: #F0EDE6;
    --text: #1a1a1a;
    --text-muted: #6b6560;
    --text-light: #9a948e;
    --border: #ddd8d0;
    --white: #ffffff;
    --success: #1a6b4a;
    --success-bg: #e8f5ee;
    --warning: #856404;
    --warning-bg: #fff3cd;
    --danger: #991b1b;
    --danger-bg: #fef2f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Header */
  .header {
    background: var(--navy);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 500;
  }
  .header-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.2);
  }
  .header-title {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-link {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    transition: color 0.2s;
  }
  .header-link:hover { color: var(--gold-light); }
  .header-search {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    background: rgba(255,255,255,0.08);
    color: var(--white);
    width: 220px;
  }
  .header-search::placeholder { color: rgba(255,255,255,0.4); }
  .header-search:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.12); }

  /* Kanban board */
  .board {
    display: flex;
    gap: 16px;
    padding: 20px;
    min-height: calc(100vh - 60px);
    align-items: flex-start;
  }

  .column {
    flex: 1;
    min-width: 280px;
    max-width: 340px;
    background: var(--cream-dark);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 100px);
  }

  .column-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid transparent;
    border-radius: 12px 12px 0 0;
    flex-shrink: 0;
  }
  .column-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .column-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text);
  }
  .column-count {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
  }

  /* Column theme colors */
  .column-new .column-header { border-bottom-color: #3b82f6; }
  .column-new .column-dot { background: #3b82f6; }
  .column-reviewed .column-header { border-bottom-color: #f59e0b; }
  .column-reviewed .column-dot { background: #f59e0b; }
  .column-signed .column-header { border-bottom-color: #8b5cf6; }
  .column-signed .column-dot { background: #8b5cf6; }
  .column-complete .column-header { border-bottom-color: #22c55e; }
  .column-complete .column-dot { background: #22c55e; }

  .column-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
    min-height: 100px;
  }

  /* Drop zone visual feedback */
  .column-body.drag-over {
    background: rgba(201, 168, 76, 0.08);
    border-radius: 0 0 12px 12px;
  }

  /* Client cards */
  .client-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: grab;
    transition: all 0.2s;
    position: relative;
    user-select: none;
  }
  .client-card:hover {
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    border-color: var(--gold-light);
  }
  .client-card:active { cursor: grabbing; }
  .client-card.dragging {
    opacity: 0.5;
    transform: rotate(2deg);
  }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 2px;
  }
  .card-email {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-light);
  }
  .card-package {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .card-package.selfservice {
    background: #fff3cd;
    border-color: #d4a017;
    color: #856404;
  }
  .card-docs {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .doc-chip {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: #f0f4f8;
    color: #4a5568;
  }
  .card-flags {
    margin-top: 6px;
    font-size: 10px;
    color: var(--danger);
    font-weight: 600;
  }
  .card-click-hint {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 14px;
    color: var(--border);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .client-card:hover .card-click-hint { opacity: 1; }

  /* Ghost placeholder while dragging */
  .drop-placeholder {
    border: 2px dashed var(--gold-light);
    border-radius: 10px;
    margin-bottom: 8px;
    background: rgba(201, 168, 76, 0.06);
    transition: height 0.15s;
  }

  /* Detail panel (slide-in) */
  .detail-overlay {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
  }
  .detail-overlay.open { display: block; }
  .detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 520px;
    max-width: 100vw;
    background: var(--white);
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    z-index: 101;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }
  .detail-overlay.open .detail-panel { transform: translateX(0); }

  .detail-header {
    background: var(--navy);
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .detail-header-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--white);
    font-weight: 500;
  }
  .detail-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .detail-close:hover { color: var(--white); }

  .detail-body { padding: 24px; }

  .detail-section {
    margin-bottom: 24px;
  }
  .detail-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
  }
  .detail-label { color: var(--text-muted); }
  .detail-value { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }

  /* Status dropdown in detail */
  .status-select {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    background: var(--white);
    cursor: pointer;
  }
  .status-select:focus { outline: none; border-color: var(--gold); }

  /* Notes */
  .notes-textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1.5;
    resize: vertical;
  }
  .notes-textarea:focus { outline: none; border-color: var(--gold); }
  .notes-save-btn {
    margin-top: 8px;
    padding: 8px 20px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .notes-save-btn:hover { background: var(--navy-light); }
  .notes-saved {
    display: inline-block;
    margin-left: 10px;
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .notes-saved.show { opacity: 1; }

  /* Document download buttons */
  .doc-download-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .doc-download-btn:hover {
    background: var(--gold-light);
    border-color: var(--gold);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .board { padding: 12px; gap: 10px; }
    .column { min-width: 240px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">Flex Legal Services</div>
    <div class="header-divider"></div>
    <div class="header-title">Attorney Dashboard</div>
  </div>
  <div class="header-right">
    <input type="text" class="header-search" id="searchInput" placeholder="Search clients..." oninput="renderBoard()">
    <a href="/" class="header-link">Client Intake</a>
  </div>
</div>

<div class="board" id="board">
  <div class="column column-new" data-status="new">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">New</div>
      </div>
      <div class="column-count" id="countNew">0</div>
    </div>
    <div class="column-body" id="colNew"></div>
  </div>

  <div class="column column-reviewed" data-status="reviewed">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Reviewed</div>
      </div>
      <div class="column-count" id="countReviewed">0</div>
    </div>
    <div class="column-body" id="colReviewed"></div>
  </div>

  <div class="column column-signed" data-status="signed">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Signed</div>
      </div>
      <div class="column-count" id="countSigned">0</div>
    </div>
    <div class="column-body" id="colSigned"></div>
  </div>

  <div class="column column-complete" data-status="complete">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Complete</div>
      </div>
      <div class="column-count" id="countComplete">0</div>
    </div>
    <div class="column-body" id="colComplete"></div>
  </div>
</div>

<!-- Detail panel overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-header-name" id="detailName"></div>
      <button class="detail-close" onclick="closeDetailPanel()">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
let intakes = [];
let draggedId = null;
let draggedEl = null;
let placeholder = null;

// ── Load data ──────────────────────────────────────────────────────────────
async function loadIntakes() {
  try {
    const res = await fetch('/api/intakes');
    intakes = await res.json();
    renderBoard();
  } catch (err) {
    console.error('Failed to load intakes:', err);
  }
}

function escape(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Render Kanban ──────────────────────────────────────────────────────────
function renderBoard() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();

  const filtered = search
    ? intakes.filter(i => i.client_name.toLowerCase().includes(search) || (i.client_email || '').toLowerCase().includes(search))
    : intakes;

  const buckets = { new: [], reviewed: [], signed: [], complete: [] };
  filtered.forEach(i => {
    if (buckets[i.status]) buckets[i.status].push(i);
  });

  renderColumn('colNew', buckets.new, 'countNew');
  renderColumn('colReviewed', buckets.reviewed, 'countReviewed');
  renderColumn('colSigned', buckets.signed, 'countSigned');
  renderColumn('colComplete', buckets.complete, 'countComplete');
}

function renderColumn(colId, items, countId) {
  const col = document.getElementById(colId);
  document.getElementById(countId).textContent = items.length;

  if (items.length === 0) {
    col.innerHTML = '<div style="text-align:center;padding:24px 12px;color:var(--text-light);font-size:13px;">No clients</div>';
    return;
  }

  col.innerHTML = items.map(intake => {
    const date = new Date(intake.created_at + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const docs = (Array.isArray(intake.documents) ? intake.documents : []).map(d => `<span class="doc-chip">${d}</span>`).join('');
    const isSS = intake.trust_type === 'selfservice';
    const pkgLabel = intake.package_type.replace('Complete Estate Plan — ', '').replace('Attorney-Directed Documents', 'Attorney-Directed');
    const hasFlags = intake.intake_data_preview && intake.intake_data_preview.includes('Attorney_Flags');

    return `
      <div class="client-card" draggable="true" data-id="${intake.id}"
           ondragstart="onDragStart(event, ${intake.id})"
           ondragend="onDragEnd(event)"
           onclick="openDetail(${intake.id})">
        <span class="card-click-hint">&#8250;</span>
        <div class="card-name">${escape(intake.client_name)}</div>
        <div class="card-email">${escape(intake.client_email || '')}</div>
        <div class="card-meta">
          <span class="card-package ${isSS ? 'selfservice' : ''}">${escape(pkgLabel)}</span>
          <span>${date}</span>
        </div>
        ${docs ? `<div class="card-docs">${docs}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Drag & Drop ────────────────────────────────────────────────────────────
function onDragStart(e, id) {
  draggedId = id;
  draggedEl = e.target.closest('.client-card');
  draggedEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);

  // Create placeholder
  placeholder = document.createElement('div');
  placeholder.className = 'drop-placeholder';
  placeholder.style.height = draggedEl.offsetHeight + 'px';
}

function onDragEnd(e) {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedId = null;
  if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  placeholder = null;
  // Remove all drag-over highlights
  document.querySelectorAll('.column-body').forEach(col => col.classList.remove('drag-over'));
}

// Set up column drop zones
document.querySelectorAll('.column-body').forEach(col => {
  col.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');

    // Position the placeholder
    const cards = [...col.querySelectorAll('.client-card:not(.dragging)')];
    const afterCard = cards.find(card => {
      const rect = card.getBoundingClientRect();
      return e.clientY < rect.top + rect.height / 2;
    });

    if (placeholder) {
      if (afterCard) {
        col.insertBefore(placeholder, afterCard);
      } else {
        col.appendChild(placeholder);
      }
    }
  });

  col.addEventListener('dragleave', (e) => {
    // Only remove if leaving the column entirely
    if (!col.contains(e.relatedTarget)) {
      col.classList.remove('drag-over');
      if (placeholder && placeholder.parentNode === col) col.removeChild(placeholder);
    }
  });

  col.addEventListener('drop', async (e) => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);

    const id = parseInt(e.dataTransfer.getData('text/plain'));
    const newStatus = col.closest('.column').dataset.status;

    // Update locally
    const intake = intakes.find(i => i.id === id);
    if (intake && intake.status !== newStatus) {
      intake.status = newStatus;
      renderBoard();
      // Persist to server
      try {
        await fetch(`/api/intakes/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
      } catch (err) {
        console.error('Failed to update status:', err);
      }
    }
  });
});

// ── Detail panel ───────────────────────────────────────────────────────────
let currentDetailId = null;

async function openDetail(id) {
  // Don't open if we just finished dragging
  if (draggedId) return;
  currentDetailId = id;
  try {
    const res = await fetch(`/api/intakes/${id}`);
    const intake = await res.json();
    renderDetail(intake);
    document.getElementById('detailOverlay').classList.add('open');
  } catch (err) {
    console.error('Failed to load intake:', err);
  }
}

function closeDetail(event) {
  if (event.target === document.getElementById('detailOverlay')) closeDetailPanel();
}

function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}

function renderDetail(intake) {
  const data = intake.intake_data || {};
  const date = new Date(intake.created_at + 'Z').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const isSelfService = intake.trust_type === 'selfservice';

  document.getElementById('detailName').textContent = intake.client_name;

  // Document download buttons
  const docButtons = [];
  const docs = Array.isArray(intake.documents) ? intake.documents : [];
  if (docs.includes('Joint Trust') || intake.trust_type === 'joint') {
    docButtons.push(`<a class="doc-download-btn" href="/api/intakes/${intake.id}/download/joint_trust" target="_blank">&#128196; Joint Trust</a>`);
  }
  if (docs.includes('Single Trust') || intake.trust_type === 'single') {
    docButtons.push(`<a class="doc-download-btn" href="/api/intakes/${intake.id}/download/single_trust" target="_blank">&#128196; Single Trust</a>`);
  }
  if (docs.includes('Financial POA')) {
    docButtons.push(`<a class="doc-download-btn" href="/api/intakes/${intake.id}/download/dpoa" target="_blank">&#128196; Financial POA</a>`);
  }
  if (docs.includes('Will')) {
    docButtons.push(`<a class="doc-download-btn" href="/api/intakes/${intake.id}/download/will" target="_blank">&#128196; Will</a>`);
  }
  if (docs.includes('Healthcare Directive')) {
    docButtons.push(`<a class="doc-download-btn" href="/api/intakes/${intake.id}/download/hcd" target="_blank">&#128196; Healthcare Directive</a>`);
  }

  // Collected data rows
  const skipKeys = ['Trust_Type', 'needs_dpoa', 'needs_will', 'needs_hcd', 'client_email', 'Attorney_Flags'];
  const dataRows = Object.entries(data)
    .filter(([k, v]) => !skipKeys.includes(k) && v && v !== 'N/A' && v !== '' && v !== 'false' && v !== false)
    .map(([k, v]) => {
      const label = k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      const val = typeof v === 'string' && v.length > 120 ? v.substring(0, 120) + '...' : v;
      return `<div class="detail-row"><span class="detail-label">${escape(label)}</span><span class="detail-value">${escape(String(val))}</span></div>`;
    }).join('');

  const flags = data.Attorney_Flags
    ? data.Attorney_Flags.split(' | ').map(f => `<div style="padding:4px 0;font-size:13px;color:#991b1b;">&#9873; ${escape(f)}</div>`).join('')
    : '';

  document.getElementById('detailBody').innerHTML = `
    ${isSelfService ? '<div style="background:#fff3cd;border:1px solid #d4a017;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#664d03;font-weight:600;">Self-Service — No attorney-client relationship. Documents not attorney-reviewed.</div>' : ''}

    <div class="detail-section">
      <div class="detail-section-title">Status</div>
      <select class="status-select" id="statusSelect" onchange="updateStatus(${intake.id}, this.value)">
        <option value="new" ${intake.status === 'new' ? 'selected' : ''}>New</option>
        <option value="reviewed" ${intake.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
        <option value="signed" ${intake.status === 'signed' ? 'selected' : ''}>Signed</option>
        <option value="complete" ${intake.status === 'complete' ? 'selected' : ''}>Complete</option>
      </select>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Client Information</div>
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${escape(intake.client_name)}</span></div>
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escape(intake.client_email || 'N/A')}</span></div>
      <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${escape(intake.client_phone || 'N/A')}</span></div>
      <div class="detail-row"><span class="detail-label">Package</span><span class="detail-value">${escape(intake.package_type)}</span></div>
      <div class="detail-row"><span class="detail-label">Submitted</span><span class="detail-value">${date}</span></div>
    </div>

    ${flags ? `<div class="detail-section"><div class="detail-section-title">Attorney Flags</div>${flags}</div>` : ''}

    <div class="detail-section">
      <div class="detail-section-title">Documents</div>
      ${docButtons.length > 0 ? `<div style="display:flex;flex-wrap:wrap;">${docButtons.join('')}</div>` : '<div style="font-size:13px;color:var(--text-muted);">No documents generated</div>'}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Collected Data</div>
      ${dataRows || '<div style="font-size:13px;color:var(--text-muted);">No data</div>'}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Attorney Notes</div>
      <textarea class="notes-textarea" id="notesTextarea" placeholder="Add notes about this client...">${escape(intake.notes || '')}</textarea>
      <div>
        <button class="notes-save-btn" onclick="saveNotes(${intake.id})">Save Notes</button>
        <span class="notes-saved" id="notesSaved">Saved</span>
      </div>
    </div>
  `;
}

async function updateStatus(id, status) {
  try {
    await fetch(`/api/intakes/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const intake = intakes.find(i => i.id === id);
    if (intake) intake.status = status;
    renderBoard();
  } catch (err) {
    console.error('Failed to update status:', err);
  }
}

async function saveNotes(id) {
  const notes = document.getElementById('notesTextarea').value;
  try {
    await fetch(`/api/intakes/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    });
    const savedEl = document.getElementById('notesSaved');
    savedEl.classList.add('show');
    setTimeout(() => savedEl.classList.remove('show'), 2000);
  } catch (err) {
    console.error('Failed to save notes:', err);
  }
}

// Escape to close detail
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentDetailId) closeDetailPanel();
});

// Load on page ready
loadIntakes();
</script>
</body>
</html>
