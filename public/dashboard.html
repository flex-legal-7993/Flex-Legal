<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attorney Dashboard — Flex Legal Services</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F3D6B;
    --navy-dark: #082a4d;
    --navy-light: #1a5490;
    --gold: #C9A84C;
    --gold-light: #e8d5a3;
    --gold-dark: #a8863a;
    --cream: #FAF8F4;
    --cream-dark: #F0EDE6;
    --text: #1a1a1a;
    --text-muted: #6b6560;
    --text-light: #9a948e;
    --border: #ddd8d0;
    --white: #ffffff;
    --success: #1a6b4a;
    --success-bg: #e8f5ee;
    --warning: #856404;
    --warning-bg: #fff3cd;
    --danger: #991b1b;
    --danger-bg: #fef2f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Header */
  .header {
    background: var(--navy);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 500;
  }
  .header-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.2);
  }
  .header-title {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-link {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    transition: color 0.2s;
  }
  .header-link:hover { color: var(--gold-light); }
  .header-search {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    background: rgba(255,255,255,0.08);
    color: var(--white);
    width: 220px;
  }
  .header-search::placeholder { color: rgba(255,255,255,0.4); }
  .header-search:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.12); }

  /* Kanban board */
  .board {
    display: flex;
    gap: 16px;
    padding: 20px;
    min-height: calc(100vh - 60px);
    align-items: flex-start;
  }

  .column {
    flex: 1;
    min-width: 280px;
    max-width: 340px;
    background: var(--cream-dark);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 100px);
  }

  .column-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid transparent;
    border-radius: 12px 12px 0 0;
    flex-shrink: 0;
  }
  .column-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .column-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text);
  }
  .column-count {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
  }

  /* Column theme colors */
  .column-new .column-header { border-bottom-color: #3b82f6; }
  .column-new .column-dot { background: #3b82f6; }
  .column-drafting .column-header { border-bottom-color: #f59e0b; }
  .column-drafting .column-dot { background: #f59e0b; }
  .column-sent .column-header { border-bottom-color: #8b5cf6; }
  .column-sent .column-dot { background: #8b5cf6; }
  .column-complete .column-header { border-bottom-color: #22c55e; }
  .column-complete .column-dot { background: #22c55e; }

  .column-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
    min-height: 100px;
  }

  /* Drop zone visual feedback */
  .column-body.drag-over {
    background: rgba(201, 168, 76, 0.08);
    border-radius: 0 0 12px 12px;
  }

  /* Board tabs */
  .board-tabs {
    display: flex;
    gap: 0;
    padding: 16px 20px 0 20px;
  }
  .board-tab {
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text-muted);
    background: var(--cream-dark);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: -1px;
    position: relative;
  }
  .board-tab.active {
    background: var(--cream);
    color: var(--navy);
    border-bottom: 1px solid var(--cream);
    z-index: 1;
  }
  .board-tab:hover:not(.active) { color: var(--navy); background: #eae7e0; }
  .board-tab .tab-count {
    display: inline-block;
    background: var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 0 7px;
    font-size: 11px;
    margin-left: 6px;
    font-weight: 700;
  }
  .board-tab.active .tab-count {
    background: var(--navy);
    color: var(--white);
  }

  /* Client cards — compact horizontal rows */
  .client-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 6px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .client-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-color: var(--gold-light);
  }
  .client-card:active { cursor: grabbing; }
  .client-card.dragging {
    opacity: 0.5;
    transform: rotate(1deg);
  }

  .card-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-email {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .card-pill {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .card-pill.pill-new { background: #dbeafe; color: #1e40af; }
  .card-pill.pill-drafting { background: #fef3c7; color: #92400e; }
  .card-pill.pill-sent { background: #ede9fe; color: #5b21b6; }
  .card-pill.pill-complete { background: #d1fae5; color: #065f46; }
  .card-pill.pill-signing {
    background: #d1fae5;
    color: #065f46;
    font-weight: 600;
  }
  .card-date {
    font-size: 11px;
    color: var(--text-light);
    white-space: nowrap;
  }
  .card-chevron {
    font-size: 14px;
    color: var(--border);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .client-card:hover .card-chevron { opacity: 1; }

  /* Self-service section */
  .selfservice-section {
    display: none;
    padding: 20px;
  }
  .selfservice-section.active { display: block; }
  .ss-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .ss-table thead th {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-align: left;
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
  }
  .ss-table tbody tr {
    transition: background 0.15s;
  }
  .ss-table tbody tr:hover { background: var(--cream); }
  .ss-table tbody td {
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .ss-table tbody tr:last-child td { border-bottom: none; }
  .ss-actions {
    display: flex;
    gap: 6px;
  }
  .ss-btn {
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--cream);
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .ss-btn:hover { background: var(--cream-dark); }
  .ss-btn.ss-archive { color: var(--navy); }
  .ss-btn.ss-archive:hover { background: var(--gold-light); border-color: var(--gold); }
  .ss-btn.ss-delete { color: var(--danger); }
  .ss-btn.ss-delete:hover { background: var(--danger-bg); border-color: #fca5a5; }
  .ss-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
    font-size: 14px;
  }

  /* Ghost placeholder while dragging */
  .drop-placeholder {
    border: 2px dashed var(--gold-light);
    border-radius: 10px;
    margin-bottom: 8px;
    background: rgba(201, 168, 76, 0.06);
    transition: height 0.15s;
  }

  /* Detail panel (slide-in) */
  .detail-overlay {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
  }
  .detail-overlay.open { display: block; }
  .detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 520px;
    max-width: 100vw;
    background: var(--white);
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    z-index: 101;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }
  .detail-overlay.open .detail-panel { transform: translateX(0); }

  .detail-header {
    background: var(--navy);
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .detail-header-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--white);
    font-weight: 500;
  }
  .detail-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .detail-close:hover { color: var(--white); }

  .detail-body { padding: 24px; }

  .detail-section {
    margin-bottom: 24px;
  }
  .detail-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
  }
  .detail-label { color: var(--text-muted); }
  .detail-value { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }

  /* Status dropdown in detail */
  .status-select {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    background: var(--white);
    cursor: pointer;
  }
  .status-select:focus { outline: none; border-color: var(--gold); }

  /* Notes */
  .notes-textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1.5;
    resize: vertical;
  }
  .notes-textarea:focus { outline: none; border-color: var(--gold); }
  .notes-save-btn {
    margin-top: 8px;
    padding: 8px 20px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .notes-save-btn:hover { background: var(--navy-light); }
  .notes-saved {
    display: inline-block;
    margin-left: 10px;
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .notes-saved.show { opacity: 1; }

  /* Archive / Delete actions */
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .action-btn-archive {
    background: var(--cream);
    color: var(--text-muted);
  }
  .action-btn-archive:hover {
    background: var(--cream-dark);
    border-color: var(--text-light);
  }
  .action-btn-delete {
    background: #fff5f5;
    color: #c0392b;
    border-color: #f5c6cb;
  }
  .action-btn-delete:hover {
    background: #fde8e8;
    border-color: #c0392b;
  }
  .action-btn-restore {
    background: var(--cream);
    color: var(--success, #27ae60);
    border-color: var(--success, #27ae60);
  }
  .action-btn-restore:hover {
    background: #e8f8f0;
  }

  /* Document download buttons */
  .doc-download-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .doc-download-btn:hover {
    background: var(--gold-light);
    border-color: var(--gold);
  }

  /* Editable merge fields */
  .field-group { margin-bottom: 12px; }
  .field-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .field-group input {
    width: 100%;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--navy);
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .field-group input:focus {
    outline: none;
    border-color: var(--gold);
  }
  .field-group input.field-changed {
    border-color: var(--gold);
    background: #fffdf5;
  }
  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }
  .fields-grid .field-full { grid-column: 1 / -1; }

  /* Generate button */
  .generate-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .generate-btn:hover { background: var(--navy-light); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .generate-btn .btn-icon { font-size: 16px; }

  /* Save fields button */
  .save-fields-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-fields-btn:hover { background: var(--gold-light); }
  .fields-saved {
    display: inline-block;
    margin-left: 10px;
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .fields-saved.show { opacity: 1; }

  /* Attorney flags editable */
  .flag-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .flag-item:last-child { border-bottom: none; }
  .flag-icon { color: #991b1b; font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .flag-text { flex: 1; color: #991b1b; line-height: 1.4; }
  .flag-resolved .flag-text { color: var(--text-muted); text-decoration: line-through; }
  .flag-resolve-btn {
    padding: 2px 8px;
    font-size: 11px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--navy);
    white-space: nowrap;
  }
  .flag-resolve-btn:hover { background: var(--gold-light); }

  /* Responsive */
  @media (max-width: 900px) {
    .board { padding: 12px; gap: 10px; }
    .column { min-width: 240px; }
  }

  /* ── Floating Chat ─────────────────────────────────────────────────────── */
  .chat-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    border: 2px solid var(--gold);
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .chat-fab:hover { background: var(--navy-light); transform: scale(1.05); }
  .chat-fab.has-context { border-color: var(--success); }
  .chat-fab.has-context::after {
    content: '';
    position: absolute;
    top: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--success);
    border: 2px solid var(--navy);
  }

  .chat-overlay {
    display: none;
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: 400px;
    max-width: calc(100vw - 48px);
    height: 520px;
    max-height: calc(100vh - 120px);
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    z-index: 201;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .chat-overlay.open { display: flex; }

  .chat-header {
    background: var(--navy);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-header-icon {
    font-size: 18px;
  }
  .chat-header-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--white);
    font-weight: 500;
  }
  .chat-header-context {
    font-size: 11px;
    color: var(--gold-light);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .chat-close-btn:hover { color: var(--white); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .chat-msg.user {
    align-self: flex-end;
    background: var(--navy);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .chat-msg.assistant {
    align-self: flex-start;
    background: var(--cream-dark);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.assistant p { margin: 0 0 8px 0; }
  .chat-msg.assistant p:last-child { margin-bottom: 0; }
  .chat-msg.assistant ul, .chat-msg.assistant ol { margin: 4px 0 8px 18px; padding: 0; }
  .chat-msg.assistant li { margin-bottom: 2px; }
  .chat-msg.assistant strong { color: var(--navy); }
  .chat-msg.assistant code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .chat-msg.streaming::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 14px;
    background: var(--navy);
    margin-left: 2px;
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .chat-welcome {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .chat-welcome-icon { font-size: 32px; margin-bottom: 8px; }
  .chat-welcome-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .chat-suggestions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }
  .chat-suggestion {
    padding: 8px 12px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--navy);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .chat-suggestion:hover { background: var(--gold-light); border-color: var(--gold); }

  .chat-input-area {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--white);
  }
  .chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    resize: none;
    max-height: 80px;
    line-height: 1.4;
  }
  .chat-input:focus { outline: none; border-color: var(--gold); }
  .chat-send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--navy);
    color: var(--gold);
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .chat-send-btn:hover { background: var(--navy-light); }
  .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo" id="headerLogo">Flex Legal Services</div>
    <div class="header-divider"></div>
    <div class="header-title">Attorney Dashboard</div>
  </div>
  <div class="header-right">
    <input type="text" class="header-search" id="searchInput" placeholder="Search clients..." oninput="renderBoard()">
    <a href="/" class="header-link">Client Intake</a>
    <a href="#" class="header-link" onclick="logout()" style="color:var(--gold-light);">Sign Out</a>
  </div>
</div>

<div class="board-tabs">
  <button class="board-tab active" id="tabAttorney" onclick="switchBoardTab('attorney')">Attorney-Directed <span class="tab-count" id="tabCountAttorney">0</span></button>
  <button class="board-tab" id="tabSelfService" onclick="switchBoardTab('selfservice')">Self-Service <span class="tab-count" id="tabCountSelfService">0</span></button>
  <button class="board-tab" id="tabArchived" onclick="switchBoardTab('archived')">Archived <span class="tab-count" id="tabCountArchived">0</span></button>
</div>

<div class="board" id="board">
  <div class="column column-new" data-status="new">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">New</div>
      </div>
      <div class="column-count" id="countNew">0</div>
    </div>
    <div class="column-body" id="colNew"></div>
  </div>

  <div class="column column-drafting" data-status="reviewed">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Drafting</div>
      </div>
      <div class="column-count" id="countDrafting">0</div>
    </div>
    <div class="column-body" id="colDrafting"></div>
  </div>

  <div class="column column-sent" data-status="signed">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Sent to Client</div>
      </div>
      <div class="column-count" id="countSent">0</div>
    </div>
    <div class="column-body" id="colSent"></div>
  </div>

  <div class="column column-complete" data-status="complete">
    <div class="column-header">
      <div class="column-header-left">
        <div class="column-dot"></div>
        <div class="column-title">Complete</div>
      </div>
      <div class="column-count" id="countComplete">0</div>
    </div>
    <div class="column-body" id="colComplete"></div>
  </div>
</div>

<div class="selfservice-section" id="selfserviceSection">
  <table class="ss-table">
    <thead>
      <tr>
        <th>Client</th>
        <th>Email</th>
        <th>Date</th>
        <th>Documents</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="ssTableBody">
    </tbody>
  </table>
</div>

<div class="selfservice-section" id="archivedSection" style="display:none;">
  <table class="ss-table">
    <thead>
      <tr>
        <th>Client</th>
        <th>Email</th>
        <th>Type</th>
        <th>Archived</th>
        <th>Previous Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="archivedTableBody">
    </tbody>
  </table>
</div>

<!-- Detail panel overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-header-name" id="detailName"></div>
      <button class="detail-close" onclick="closeDetailPanel()">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
let intakes = [];
let draggedId = null;
let draggedEl = null;
let placeholder = null;

// ── Load data ──────────────────────────────────────────────────────────────
async function loadIntakes() {
  try {
    const res = await fetch('/api/intakes');
    if (!res.ok) {
      if (res.status === 401) { window.location.href = '/login'; return; }
      throw new Error(`Server returned ${res.status}`);
    }
    intakes = await res.json();
    renderBoard();
  } catch (err) {
    console.error('Failed to load intakes:', err);
  }
}

function escape(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Board tab switching ───────────────────────────────────────────────────
let activeTab = 'attorney';

function switchBoardTab(tab) {
  activeTab = tab;
  document.getElementById('tabAttorney').classList.toggle('active', tab === 'attorney');
  document.getElementById('tabSelfService').classList.toggle('active', tab === 'selfservice');
  document.getElementById('tabArchived').classList.toggle('active', tab === 'archived');
  document.getElementById('board').style.display = tab === 'attorney' ? 'flex' : 'none';
  document.getElementById('selfserviceSection').classList.toggle('active', tab === 'selfservice');
  document.getElementById('archivedSection').style.display = tab === 'archived' ? 'block' : 'none';
  if (tab === 'selfservice') renderSelfServiceTable();
  if (tab === 'archived') renderArchivedTable();
}

// Status label mapping (DB status → display label)
const STATUS_LABELS = {
  new: 'New',
  reviewed: 'Drafting',
  signed: 'Sent to Client',
  complete: 'Complete'
};
const STATUS_PILL_CLASS = {
  new: 'pill-new',
  reviewed: 'pill-drafting',
  signed: 'pill-sent',
  complete: 'pill-complete'
};

function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ── Render Kanban ──────────────────────────────────────────────────────────
function renderBoard() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();

  const filtered = search
    ? intakes.filter(i => i.client_name.toLowerCase().includes(search) || (i.client_email || '').toLowerCase().includes(search))
    : intakes;

  // Split: active attorney-directed, active self-service, archived
  const active = filtered.filter(i => i.status !== 'archived');
  const attorney = active.filter(i => i.trust_type !== 'selfservice');
  const selfservice = active.filter(i => i.trust_type === 'selfservice');
  const archived = filtered.filter(i => i.status === 'archived');

  // Update tab counts
  document.getElementById('tabCountAttorney').textContent = attorney.length;
  document.getElementById('tabCountSelfService').textContent = selfservice.length;
  document.getElementById('tabCountArchived').textContent = archived.length;

  const buckets = { new: [], reviewed: [], signed: [], complete: [] };
  attorney.forEach(i => {
    if (buckets[i.status]) buckets[i.status].push(i);
  });

  renderColumn('colNew', buckets.new, 'countNew');
  renderColumn('colDrafting', buckets.reviewed, 'countDrafting');
  renderColumn('colSent', buckets.signed, 'countSent');
  renderColumn('colComplete', buckets.complete, 'countComplete');

  // Refresh active sub-tab
  if (activeTab === 'selfservice') renderSelfServiceTable();
  if (activeTab === 'archived') renderArchivedTable();
}

function renderColumn(colId, items, countId) {
  const col = document.getElementById(colId);
  document.getElementById(countId).textContent = items.length;

  if (items.length === 0) {
    col.innerHTML = '<div style="text-align:center;padding:24px 12px;color:var(--text-light);font-size:13px;">No clients</div>';
    return;
  }

  col.innerHTML = items.map(intake => {
    const date = new Date(intake.created_at + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const initials = getInitials(intake.client_name);
    const pillClass = STATUS_PILL_CLASS[intake.status] || 'pill-new';
    const pillLabel = STATUS_LABELS[intake.status] || intake.status;

    // Show green signing date pill for "Sent to Client" column items that have a signing date
    let signingPill = '';
    if (intake.status === 'signed' && intake.intake_data_preview) {
      const signingMatch = intake.intake_data_preview.match(/signing_date['":\s]+([^'",}]+)/i);
      if (signingMatch) {
        signingPill = `<span class="card-pill pill-signing">${escape(signingMatch[1].trim())}</span>`;
      }
    }

    return `
      <div class="client-card" draggable="true" data-id="${intake.id}"
           ondragstart="onDragStart(event, ${intake.id})"
           ondragend="onDragEnd(event)"
           onclick="openDetail(${intake.id})">
        <div class="card-avatar">${initials}</div>
        <div class="card-info">
          <div class="card-name">${escape(intake.client_name)}</div>
          <div class="card-email">${escape(intake.package_type.replace('Complete Estate Plan — ', '').replace('Attorney-Directed Documents', 'Attorney-Directed'))}</div>
        </div>
        <div class="card-right">
          ${signingPill}
          <span class="card-pill ${pillClass}">${pillLabel}</span>
          <span class="card-date">${date}</span>
          <span class="card-chevron">&#8250;</span>
        </div>
      </div>`;
  }).join('');
}

// ── Self-Service Table ────────────────────────────────────────────────────
function renderSelfServiceTable() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const ssIntakes = intakes.filter(i => i.trust_type === 'selfservice' && i.status !== 'archived');
  const filtered = search
    ? ssIntakes.filter(i => i.client_name.toLowerCase().includes(search) || (i.client_email || '').toLowerCase().includes(search))
    : ssIntakes;

  const tbody = document.getElementById('ssTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="ss-empty">No self-service intakes</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(intake => {
    const date = new Date(intake.created_at + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const docs = (Array.isArray(intake.documents) ? intake.documents : []).join(', ') || 'None';
    return `
      <tr>
        <td style="font-weight:600;color:var(--navy);cursor:pointer;" onclick="openDetail(${intake.id})">${escape(intake.client_name)}</td>
        <td style="color:var(--text-muted);">${escape(intake.client_email || '')}</td>
        <td>${date}</td>
        <td style="font-size:12px;color:var(--text-muted);">${escape(docs)}</td>
        <td>
          <div class="ss-actions">
            <button class="ss-btn ss-archive" onclick="archiveSelfService(${intake.id})" title="Archive">Archive</button>
            <button class="ss-btn ss-delete" onclick="deleteSelfService(${intake.id})" title="Delete">Delete</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

async function archiveSelfService(id) {
  if (!confirm('Archive this self-service intake?')) return;
  try {
    await fetch(`/api/intakes/${id}/archive`, { method: 'POST' });
    const intake = intakes.find(i => i.id === id);
    if (intake) { intake.previous_status = intake.status; intake.status = 'archived'; }
    renderBoard();
  } catch (err) {
    console.error('Failed to archive:', err);
  }
}

async function deleteSelfService(id) {
  if (!confirm('Remove this self-service intake? It will be moved to the Archived tab.')) return;
  try {
    await fetch(`/api/intakes/${id}`, { method: 'DELETE' });
    const intake = intakes.find(i => i.id === id);
    if (intake) { intake.previous_status = intake.status; intake.status = 'archived'; }
    renderBoard();
  } catch (err) {
    console.error('Failed to delete:', err);
  }
}

// ── Archived Table ────────────────────────────────────────────────────────
function renderArchivedTable() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const archived = intakes.filter(i => i.status === 'archived');
  const filtered = search
    ? archived.filter(i => i.client_name.toLowerCase().includes(search) || (i.client_email || '').toLowerCase().includes(search))
    : archived;

  const tbody = document.getElementById('archivedTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="ss-empty">No archived clients</td></tr>';
    return;
  }

  const prevStatusLabels = { new: 'New', reviewed: 'Drafting', signed: 'Sent to Client', complete: 'Complete' };

  tbody.innerHTML = filtered.map(intake => {
    const date = intake.updated_at
      ? new Date(intake.updated_at + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : 'Unknown';
    const typeLabel = intake.trust_type === 'selfservice' ? 'Self-Service'
      : intake.trust_type === 'joint' ? 'Joint Trust'
      : intake.trust_type === 'single' ? 'Single Trust'
      : intake.trust_type === 'snt' ? 'Special Needs Trust'
      : intake.trust_type === 'standalone' ? 'Attorney-Directed'
      : escape(intake.trust_type || '');
    const prevStatus = prevStatusLabels[intake.previous_status] || intake.previous_status || 'New';
    return `
      <tr>
        <td style="font-weight:600;color:var(--navy);cursor:pointer;" onclick="openDetail(${intake.id})">${escape(intake.client_name)}</td>
        <td style="color:var(--text-muted);">${escape(intake.client_email || '')}</td>
        <td style="font-size:12px;">${typeLabel}</td>
        <td>${date}</td>
        <td><span style="font-size:12px;color:var(--text-muted);">${prevStatus}</span></td>
        <td>
          <button class="action-btn action-btn-restore" style="padding:5px 12px;font-size:12px;" onclick="restoreClient(${intake.id})">&#8634; Restore</button>
        </td>
      </tr>`;
  }).join('');
}

// ── Drag & Drop ────────────────────────────────────────────────────────────
function onDragStart(e, id) {
  draggedId = id;
  draggedEl = e.target.closest('.client-card');
  draggedEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);

  // Create placeholder
  placeholder = document.createElement('div');
  placeholder.className = 'drop-placeholder';
  placeholder.style.height = draggedEl.offsetHeight + 'px';
}

function onDragEnd(e) {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedId = null;
  if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  placeholder = null;
  // Remove all drag-over highlights
  document.querySelectorAll('.column-body').forEach(col => col.classList.remove('drag-over'));
}

// Set up column drop zones
document.querySelectorAll('.column-body').forEach(col => {
  col.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');

    // Position the placeholder
    const cards = [...col.querySelectorAll('.client-card:not(.dragging)')];
    const afterCard = cards.find(card => {
      const rect = card.getBoundingClientRect();
      return e.clientY < rect.top + rect.height / 2;
    });

    if (placeholder) {
      if (afterCard) {
        col.insertBefore(placeholder, afterCard);
      } else {
        col.appendChild(placeholder);
      }
    }
  });

  col.addEventListener('dragleave', (e) => {
    // Only remove if leaving the column entirely
    if (!col.contains(e.relatedTarget)) {
      col.classList.remove('drag-over');
      if (placeholder && placeholder.parentNode === col) col.removeChild(placeholder);
    }
  });

  col.addEventListener('drop', async (e) => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);

    const id = parseInt(e.dataTransfer.getData('text/plain'));
    const newStatus = col.closest('.column').dataset.status;

    // Update locally
    const intake = intakes.find(i => i.id === id);
    if (intake && intake.status !== newStatus) {
      intake.status = newStatus;
      renderBoard();
      // Persist to server
      try {
        await fetch(`/api/intakes/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
      } catch (err) {
        console.error('Failed to update status:', err);
      }
    }
  });
});

// ── Detail panel ───────────────────────────────────────────────────────────
let currentDetailId = null;

async function openDetail(id) {
  // Don't open if we just finished dragging
  if (draggedId) return;
  currentDetailId = id;

  // Show loading state immediately
  document.getElementById('detailName').textContent = 'Loading…';
  document.getElementById('detailBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Loading client details…</div>';
  document.getElementById('detailOverlay').classList.add('open');

  try {
    const res = await fetch(`/api/intakes/${id}`);

    // Handle auth expiration or server errors
    if (!res.ok) {
      if (res.status === 401) {
        document.getElementById('detailBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--error,#c0392b);">Your session has expired. <a href="/login" style="color:var(--gold-dark);">Sign in again</a></div>';
        return;
      }
      throw new Error(`Server returned ${res.status}`);
    }

    const intake = await res.json();

    // Validate we got real intake data (not an error object)
    if (!intake || !intake.client_name) {
      document.getElementById('detailBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">No data found for this client.</div>';
      return;
    }

    renderDetail(intake);
  } catch (err) {
    console.error('Failed to load intake:', err);
    document.getElementById('detailBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--error,#c0392b);">Failed to load client details. Please try again.</div>';
  }
}

function closeDetail(event) {
  if (event.target === document.getElementById('detailOverlay')) closeDetailPanel();
}

function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}

function getMergeFieldDefs(trustType) {
  // Return the editable merge fields relevant to each trust type
  // Format: { key, label, half (true = half-width) }
  const common = [
    { key: 'Address', label: 'Address' },
    { key: 'City', label: 'City', half: true },
    { key: 'State', label: 'State', half: true },
    { key: 'Zip_Code', label: 'Zip', half: true },
    { key: 'County', label: 'County', half: true },
  ];

  if (trustType === 'snt') {
    return [
      { key: 'Husbands_first_name', label: 'Spouse 1 First Name', half: true },
      { key: 'Wifes_first_name', label: 'Spouse 2 First Name', half: true },
      { key: 'LAST_NAME', label: 'Last Name', half: true },
      { key: 'his_preferred_signature_name', label: 'Spouse 1 Signature Name' },
      { key: 'her_preferred_signature_name', label: 'Spouse 2 Signature Name' },
      ...common,
      { key: 'SNC_NAME', label: 'Special Needs Child Full Name' },
      { key: 'SNC_First_Name', label: 'SN Child First Name', half: true },
      { key: 'sondaughter', label: 'Son/Daughter', half: true },
      { key: 'NAME_OF_TRUST', label: 'Trust Name' },
      { key: 'SNT_NAME', label: 'Special Needs Trust Name' },
      { key: 'AgentSuccessor_Trustee', label: 'Successor Trustee' },
      { key: 'ALTERNATE_AGENT', label: 'Backup Trustee' },
      { key: 'NAMES_OF_ALL_CHILDREN', label: 'All Children' },
      { key: 'Number_of_kids', label: 'Number of Kids', half: true },
      { key: 'Trustee_heshe', label: 'Trustee Pronoun (he/she)', half: true },
      { key: 'SN_hisher', label: 'SN Child Pronoun (his/her)', half: true },
      { key: 'SN_heshe', label: 'SN Child Pronoun (he/she)', half: true },
      { key: 'and_then_whomsoever_a_majority_of_the_t', label: 'Majority Clause (children/descendants)' },
      { key: 'Alternate_Agent_Name', label: 'Backup Healthcare Agent' },
      { key: 'Alternate_Agent_Address', label: 'Backup HC Agent Address' },
      { key: 'Alternate_Agent_City', label: 'Backup HC Agent City', half: true },
      { key: 'Alternate_Agent_State', label: 'Backup HC Agent State', half: true },
      { key: 'Alternate_Agent_Zip', label: 'Backup HC Agent Zip', half: true },
      { key: 'Alternate_Agent_Cell_Phone', label: 'Backup HC Agent Phone', half: true },
    ];
  } else if (trustType === 'joint') {
    return [
      { key: 'Your_First_Name', label: 'Spouse 1 First Name', half: true },
      { key: 'Your_Last_Name', label: 'Last Name', half: true },
      { key: 'Your_Preferred_Signature_Name', label: 'Spouse 1 Signature Name' },
      { key: 'Spouse_First_Name', label: 'Spouse 2 First Name', half: true },
      { key: 'Spouses_Preferred_Signature_Name', label: 'Spouse 2 Signature Name' },
      ...common,

async function updateStatus(id, status) {
  try {
    await fetch(`/api/intakes/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const intake = intakes.find(i => i.id === id);
    if (intake) intake.status = status;
    renderBoard();
  } catch (err) {
    console.error('Failed to update status:', err);
  }
}

async function saveNotes(id) {

// Archive a client (soft delete — preserves data)
async function archiveClient(id) {
  if (!confirm('Archive this client? They will be moved to the Archived tab and can be restored later.')) return;
  try {
    const res = await fetch(`/api/intakes/${id}/archive`, { method: 'POST' });
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    // Update local data
    const intake = intakes.find(i => i.id === id);
    if (intake) { intake.previous_status = intake.status; intake.status = 'archived'; }
    closeDetailPanel();
    renderBoard();
  } catch (err) {
    console.error('Failed to archive:', err);
    alert('Failed to archive client. Please try again.');
  }
}

// Delete a client (soft delete — same as archive)
async function deleteClient(id, name) {
  if (!confirm(`Remove "${name}" from your active board?\n\nThis will move them to the Archived tab. Their data is preserved and you can restore them at any time.`)) return;
  try {
    const res = await fetch(`/api/intakes/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const intake = intakes.find(i => i.id === id);
    if (intake) { intake.previous_status = intake.status; intake.status = 'archived'; }
    closeDetailPanel();
    renderBoard();
  } catch (err) {
    console.error('Failed to delete:', err);
    alert('Failed to remove client. Please try again.');
  }
}

// Restore an archived client to their previous status
async function restoreClient(id) {
  try {
    const res = await fetch(`/api/intakes/${id}/restore`, { method: 'POST' });
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const result = await res.json();
    const intake = intakes.find(i => i.id === id);
    if (intake) { intake.status = result.restoredStatus || 'new'; intake.previous_status = null; }
    closeDetailPanel();
    renderBoard();
  } catch (err) {
    console.error('Failed to restore:', err);
    alert('Failed to restore client. Please try again.');
  }
}

// Save edited merge fields
async function saveFields(id) {
  const inputs = document.querySelectorAll('.fields-grid input[data-field]');
  const fields = {};
  inputs.forEach(input => {
    fields[input.dataset.field] = input.value;
  });

  try {
    const resp = await fetch(`/api/intakes/${id}/fields`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    if (resp.ok) {
      // Update local data
      const intake = intakes.find(i => i.id === id);
      if (intake && intake.intake_data) {
        Object.assign(intake.intake_data, fields);
      }
      // Clear changed indicators
      inputs.forEach(input => input.classList.remove('field-changed'));
      const savedEl = document.getElementById('fieldsSaved');
      savedEl.classList.add('show');
      setTimeout(() => savedEl.classList.remove('show'), 2000);
    }
  } catch (err) {
    console.error('Failed to save fields:', err);
    alert('Failed to save changes. Please try again.');
  }
}

// Generate document and download
async function generateDocument(id) {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">&#9203;</span> Generating...';

  try {
    // First save any pending field changes
    const inputs = document.querySelectorAll('.fields-grid input[data-field]');
    if (inputs.length > 0) {
      const fields = {};
      inputs.forEach(input => { fields[input.dataset.field] = input.value; });
      await fetch(`/api/intakes/${id}/fields`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields })
      });
    }

    // Then generate and download
    const resp = await fetch(`/api/intakes/${id}/generate`, { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || 'Generation failed');
    }

    // Download the file
    const blob = await resp.blob();
    const disposition = resp.headers.get('Content-Disposition') || '';
    const filenameMatch = disposition.match(/filename="(.+?)"/);
    const filename = filenameMatch ? filenameMatch[1] : 'document.docx';

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);

    btn.innerHTML = '<span class="btn-icon">&#9989;</span> Downloaded!';
    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-icon">&#128196;</span> Generate Document';
    }, 2000);

    // Show Claude for Word tip (once per session)
    if (!window._claudeWordTipShown) {
      window._claudeWordTipShown = true;
      const tipId = 'claudeWordTip';
      if (!document.getElementById(tipId)) {
        const tip = document.createElement('div');
        tip.id = tipId;
        tip.style.cssText = 'margin-top:12px;padding:12px 16px;background:#f0f4ff;border:1px solid #c7d2fe;border-radius:8px;font-size:12.5px;color:#4338ca;display:flex;align-items:center;gap:10px;';
        tip.innerHTML = '<span style="font-size:18px;">&#10024;</span><span><strong>Tip:</strong> For AI-assisted editing &amp; redlining, install the <a href="https://appsource.microsoft.com/en-us/product/office/WA200007638" target="_blank" rel="noopener" style="color:#4338ca;font-weight:600;text-decoration:underline;">Claude for Word add-in</a>. It works with any .docx file you generate here.</span><button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:#4338ca;font-size:16px;cursor:pointer;">&times;</button>';
        btn.parentElement.appendChild(tip);
      }
    }
  } catch (err) {
    console.error('Document generation failed:', err);
    btn.innerHTML = '<span class="btn-icon">&#10060;</span> Failed — Try Again';
    btn.disabled = false;
    setTimeout(() => {
      btn.innerHTML = '<span class="btn-icon">&#128196;</span> Generate Document';
    }, 3000);
  }
}

// ── Floating Chat ─────────────────────────────────────────────────────────
let chatOpen = false;
let chatMessages = []; // { role: 'user'|'assistant', content: '' }
let chatStreaming = false;
let chatIntakeId = null; // intake loaded as context
let chatIntakeName = null;

function clearChatContext() {
  chatMessages = [];
  renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById('chatMessagesContainer');
  if (chatMessages.length === 0) {
    const suggestions = [
      'Summarize this client\'s estate plan',
      'Are there any red flags or missing information?',
      'What questions should I ask at the signing?'
    ];
    container.innerHTML = `
      <div class="chat-welcome">
        <div class="chat-welcome-icon">&#9878;</div>
        <div class="chat-welcome-title">Intake Loaded</div>
        <div>Ask me anything about this client's intake — summaries, red flags, signing prep, or follow-up questions.</div>
        <div class="chat-suggestions">
          ${suggestions.map(s => `<button class="chat-suggestion" onclick="sendSuggestion(this)">${s}</button>`).join('')}
        </div>
      </div>`;
    return;
  }

  container.innerHTML = chatMessages.map((m, i) => {
    const isLast = i === chatMessages.length - 1;
    const streamClass = (m.role === 'assistant' && isLast && chatStreaming) ? ' streaming' : '';
    const content = m.role === 'assistant' ? formatMarkdown(m.content) : escape(m.content);
    return `<div class="chat-msg ${m.role}${streamClass}">${content}</div>`;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

function formatMarkdown(text) {
  if (!text) return '';
  // Basic markdown: bold, italic, code, bullet lists, paragraphs
  let html = escape(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`(.+?)`/g, '<code>$1</code>');
  // Convert lines starting with - or * to list items
  const lines = html.split('\n');
  let result = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-*•]\s/.test(trimmed)) {
      if (!inList) { result += '<ul>'; inList = true; }
      result += '<li>' + trimmed.replace(/^[-*•]\s+/, '') + '</li>';
    } else {
      if (inList) { result += '</ul>'; inList = false; }
      if (trimmed === '') {
        result += '';
      } else {
        result += '<p>' + trimmed + '</p>';
      }
    }
  }
  if (inList) result += '</ul>';
  return result;
}

function sendSuggestion(btn) {
  const text = btn.textContent;
  document.getElementById('chatInput').value = text;
  sendChatMessage();
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || chatStreaming) return;

  chatMessages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  chatStreaming = true;
  chatMessages.push({ role: 'assistant', content: '' });
  renderChatMessages();
  document.getElementById('chatSendBtn').disabled = true;

  try {
    // Build messages for API (only role + content)
    const apiMessages = chatMessages.slice(0, -1).map(m => ({
      role: m.role,
      content: m.content
    }));

    const resp = await fetch('/api/dashboard-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        intakeId: chatIntakeId
      })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if (event.type === 'text') {
            chatMessages[chatMessages.length - 1].content += event.text;
            renderChatMessages();
          } else if (event.type === 'done') {
            // done
          } else if (event.type === 'error') {
            chatMessages[chatMessages.length - 1].content += '\n\n[Error: ' + event.message + ']';
            renderChatMessages();
          }
        } catch (e) { /* skip malformed events */ }
      }
    }
  } catch (err) {
    console.error('Chat error:', err);
    chatMessages[chatMessages.length - 1].content = 'Sorry, something went wrong. Please try again.';
    renderChatMessages();
  }

  chatStreaming = false;
  document.getElementById('chatSendBtn').disabled = false;
  renderChatMessages();
}

    chatIntakeName = intake.client_name;
    if (contextChanged) {
      chatMessages = []; // reset conversation for new context
    }
    updateChatContext();
    if (chatOpen) renderChatMessages();
  }
};

// When closing the detail panel, hide the chat
const _origCloseDetailPanel = closeDetailPanel;
closeDetailPanel = function() {
  _origCloseDetailPanel();
  // Close chat and hide button
  if (chatOpen) {
    chatOpen = false;
    document.getElementById('chatOverlay').classList.remove('open');
    document.getElementById('chatFab').innerHTML = '&#128172;';
  }
  chatIntakeId = null;
  chatIntakeName = null;
  chatMessages = [];
  updateChatContext();
};
</script>

<!-- Floating Chat Button -->
<button class="chat-fab" id="chatFab" onclick="toggleChat()" title="AI Assistant" style="display:none;">&#128172;</button>

<!-- Chat Overlay -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="chat-header-icon">&#9878;</span>
      <div>
        <div class="chat-header-title">AI Assistant</div>
        <div class="chat-header-context" id="chatContext" style="display:none;"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="chat-close-btn" onclick="clearChatContext()" title="Clear context &amp; history" style="font-size:13px;">&#8635;</button>
      <button class="chat-close-btn" onclick="toggleChat()" title="Close">&times;</button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessagesContainer"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Ask about an intake or estate planning..." rows="1"></textarea>
    <button class="chat-send-btn" id="chatSendBtn" onclick="sendChatMessage()" title="Send">&#10148;</button>
  </div>
</div>

<script>
(async function applyBranding() {
  try {
    const resp = await fetch('/api/config');
    const config = await resp.json();
    const firm = config.firmName || 'Flex Legal Services';
    if (firm !== 'Flex Legal Services') {
      document.getElementById('headerLogo').textContent = firm;
      document.title = 'Attorney Dashboard — ' + firm;
    }
    if (config.brandNavy) {
      document.documentElement.style.setProperty('--navy', config.brandNavy);
      document.documentElement.style.setProperty('--navy-dark', config.brandNavy);
    }
    if (config.brandGold) {
      document.documentElement.style.setProperty('--gold', config.brandGold);
      document.documentElement.style.setProperty('--gold-light', config.brandGold + '44');
    }
    if (config.brandCream) {
      document.documentElement.style.setProperty('--cream', config.brandCream);
    }
  } catch (e) {}
  const footer = document.createElement('div');
  footer.style.cssText = 'position:fixed;bottom:0;left:0;right:0;text-align:center;padding:6px 0;font-size:11px;color:rgba(255,255,255,0.5);background:rgba(15,61,107,0.95);border-top:1px solid rgba(255,255,255,0.1);z-index:199;font-family:Source Sans 3,sans-serif;';
  footer.innerHTML = 'Powered by <span style="font-weight:600;color:#C9A84C;">Casefly</span>';
  document.body.appendChild(footer);
})();
</script>
</body>
</html>
